<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sapphire Mall">
  <defs>
    <linearGradient id="react-gem-stroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7DD3FC"/>
      <stop offset="45%" stop-color="#61DAFB"/>
      <stop offset="100%" stop-color="#149ECA"/>
    </linearGradient>
    <linearGradient id="react-gem-inner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#61DAFB" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#61DAFB" stop-opacity="0.35"/>
    </linearGradient>
  </defs>

  <!-- React-style orbital strokes (thin ellipses, nucleus = gem) -->
  <g transform="translate(32 32)" fill="none" stroke="#61DAFB" stroke-width="1.35" stroke-linecap="round" opacity="0.28">
    <ellipse rx="26" ry="11"/>
    <ellipse rx="26" ry="11" transform="rotate(60)"/>
    <ellipse rx="26" ry="11" transform="rotate(120)"/>
  </g>

  <!-- Faceted gem: line-only, geometric (crown + pavilion) -->
  <g fill="none" stroke="url(#react-gem-stroke)" stroke-width="2.25" stroke-linejoin="round" stroke-linecap="round">
    <!-- Outer silhouette -->
    <path d="M32 11 L48.5 21.5 V36.5 L32 49 L15.5 36.5 V21.5 Z"/>
    <!-- Crown facets -->
    <path d="M32 11 L48.5 21.5 L32 27 L15.5 21.5 Z" stroke="url(#react-gem-inner)" stroke-width="1.5" opacity="0.9"/>
    <!-- Pavilion + table lines -->
    <path d="M15.5 21.5 L32 27 L15.5 36.5 M48.5 21.5 L32 27 L48.5 36.5 M32 27 L32 49" stroke-width="1.65" opacity="0.88"/>
  </g>

  <!-- Core glint (React nucleus dot, minimal) -->
  <circle cx="32" cy="27" r="2.25" fill="#61DAFB" opacity="0.9"/>
</svg>
