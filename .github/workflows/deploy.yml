name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      # ========== 构建前端 ==========

      - name: Install & Build Admin
        run: |
          cd web_client/sapmall-admin
          npm ci
          npm run build

      - name: Install & Build DApp
        run: |
          cd web_client/sapmall-dapp
          npm ci
          npm run build

      - name: Install & Build Website
        run: |
          cd web_client/sapmall-website
          npm ci
          npm run build

      # ========== 构建后端 ==========

      - name: Build Backend
        run: |
          cd backend_service
          go mod tidy
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -a -installsuffix cgo -o main ./app/sapmall_start.go

      # ========== 部署到服务器 ==========

      - name: Deploy to Server
        uses: easingthemes/ssh-deploy@v5
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          REMOTE_PORT: ${{ secrets.SERVER_PORT || '22' }}
          SOURCE: "web_client/sapmall-admin/build/,web_client/sapmall-dapp/build/,web_client/sapmall-website/build/,backend_service/main"
          TARGET: "/opt/sapmall/"
          ARGS: "-avz --delete"

      - name: Deploy Config & Restart Services
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          script: |
            # 创建目录
            mkdir -p /opt/sapmall/frontend/{admin,dapp,website}

            # 复制前端构建文件
            cp -rf /opt/sapmall/sapmall-admin/build/* /opt/sapmall/frontend/admin/
            cp -rf /opt/sapmall/sapmall-dapp/build/* /opt/sapmall/frontend/dapp/
            cp -rf /opt/sapmall/sapmall-website/build/* /opt/sapmall/frontend/website/

            # 复制后端二进制文件
            chmod +x /opt/sapmall/backend_service/main
            cp /opt/sapmall/backend_service/main /opt/sapmall/backend/

            # 重启后端服务
            sudo systemctl restart sapmall-backend || true

            # 重载 Nginx
            sudo systemctl reload nginx

            echo "✅ 部署完成"
