name: Deploy Production Backend

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build Backend
        run: |
          cd backend_service
          go mod tidy
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -a -installsuffix cgo -o main ./app/sapmall_start.go

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-${{ github.sha }}
          path: |
            backend_service/main
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-${{ github.sha }}

      - name: Upload Backend to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          source: "backend_service/main"
          target: "/opt/sapmall/deploy/backend-${{ github.sha }}"

      - name: Activate Backend Deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          script: |
            DEPLOY_DIR="/opt/sapmall/deploy/backend-${{ github.sha }}"

            # 停止后端服务（避免 "Text file busy" 错误）
            sudo systemctl stop sapmall-backend

            # 创建备份目录
            mkdir -p /opt/sapmall/backup

            # 备份当前后端
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            if [ -f /opt/sapmall/backend_service/main ]; then
              cp /opt/sapmall/backend_service/main /opt/sapmall/backup/main_${TIMESTAMP}
            fi

            # 部署后端
            chmod +x ${DEPLOY_DIR}/backend_service/main
            mkdir -p /opt/sapmall/backend_service
            cp ${DEPLOY_DIR}/backend_service/main /opt/sapmall/backend_service/main

            # 重启后端服务
            sudo systemctl restart sapmall-backend

            # 健康检查
            sleep 3
            curl -f http://localhost:8888/api/common/health || {
              echo "Health check failed, rolling back backend..."
              LATEST_BACKEND=$(ls -t /opt/sapmall/backup/main_* 2>/dev/null | head -1)
              if [ -n "$LATEST_BACKEND" ]; then
                cp -f "$LATEST_BACKEND" /opt/sapmall/backend_service/main
              fi
              sudo systemctl restart sapmall-backend
              exit 1
            }

            # 清理部署目录
            rm -rf ${DEPLOY_DIR}

            echo "Backend deployment successful: ${{ github.sha }}"
