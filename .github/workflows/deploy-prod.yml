name: Deploy Production

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build Admin
        run: cd web_client/sapmall-admin && npm ci --legacy-peer-deps && npm run build
        env:
          CI: false
          REACT_APP_API_BASE_URL: ${{ secrets.ADMIN_API_BASE_URL }}
      - name: Build DApp
        run: cd web_client/sapmall-dapp && npm ci --legacy-peer-deps && npm run build
        env:
          CI: false
          REACT_APP_API_BASE_URL: ${{ secrets.DAPP_API_BASE_URL }}
          REACT_APP_WALLETCONNECT_PROJECT_ID: ${{ secrets.WALLETCONNECT_PROJECT_ID }}
          REACT_APP_SWAP_ROUTER_ADDRESS: ${{ secrets.SWAP_ROUTER_ADDRESS }}
          REACT_APP_ADMIN_URL: ${{ secrets.ADMIN_URL }}
      - name: Build Website
        run: cd web_client/sapmall-website && npm ci --legacy-peer-deps && npm run build
        env:
          CI: false
          REACT_APP_DAPP_URL: ${{ secrets.DAPP_URL }}
          REACT_APP_HELP_PATH: /help
          REACT_APP_WHITEPAPER_URL: ${{ secrets.WHITEPAPER_URL }}
          REACT_APP_DEMO_URL: ${{ secrets.DEMO_URL }}
          REACT_APP_GITHUB_URL: ${{ secrets.GITHUB_URL }}
          REACT_APP_TWITTER_URL: ${{ secrets.TWITTER_URL }}
          REACT_APP_TELEGRAM_URL: ${{ secrets.TELEGRAM_URL }}
          REACT_APP_DISCORD_URL: ${{ secrets.DISCORD_URL }}

      - name: Build Backend
        run: |
          cd backend_service
          go mod tidy
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -a -installsuffix cgo -o main ./app/sapmall_start.go

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: |
            web_client/sapmall-admin/build/
            web_client/sapmall-dapp/build/
            web_client/sapmall-website/build/
            backend_service/main
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-${{ github.sha }}

      - name: Upload Frontend to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          source: "web_client/sapmall-admin/build/*,web_client/sapmall-dapp/build/*,web_client/sapmall-website/build/*"
          target: "/opt/sapmall/deploy/${{ github.sha }}"
          strip_components: 0

      - name: Upload Backend to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          source: "backend_service/main"
          target: "/opt/sapmall/deploy/${{ github.sha }}"

      - name: Activate Deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          script: |
            DEPLOY_DIR="/opt/sapmall/deploy/${{ github.sha }}"

            # 停止后端服务（避免 "Text file busy" 错误）
            sudo systemctl stop sapmall-backend

            # 创建备份目录
            mkdir -p /opt/sapmall/backup

            # 备份当前版本（前端）
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            if [ -d /opt/sapmall/web_client ]; then
              cp -r /opt/sapmall/web_client /opt/sapmall/backup/web_client_${TIMESTAMP}
            fi

            # 备份当前版本（后端）
            if [ -f /opt/sapmall/backend_service/main ]; then
              cp /opt/sapmall/backend_service/main /opt/sapmall/backup/main_${TIMESTAMP}
            fi

            # 部署新版本前端
            cp -rf ${DEPLOY_DIR}/web_client/sapmall-admin/build/* /opt/sapmall/web_client/sapmall-admin/build/
            cp -rf ${DEPLOY_DIR}/web_client/sapmall-dapp/build/* /opt/sapmall/web_client/sapmall-dapp/build/
            cp -rf ${DEPLOY_DIR}/web_client/sapmall-website/build/* /opt/sapmall/web_client/sapmall-website/build/

            # 部署后端
            chmod +x ${DEPLOY_DIR}/backend_service/main
            cp ${DEPLOY_DIR}/backend_service/main /opt/sapmall/backend_service/main

            # 重启后端服务
            sudo systemctl restart sapmall-backend

            # 重载 Nginx
            sudo systemctl reload nginx

            # 健康检查
            sleep 3
            curl -f http://localhost:8888/api/common/health || {
              echo "Health check failed, rolling back..."
              LATEST_FRONTUP=$(ls -td /opt/sapmall/backup/web_client_* | head -1)
              if [ -n "$LATEST_FRONTUP" ]; then
                rm -rf /opt/sapmall/web_client
                cp -rf "$LATEST_FRONTUP" /opt/sapmall/web_client
              fi
              LATEST_BACKEND=$(ls -t /opt/sapmall/backup/main_* | head -1)
              if [ -n "$LATEST_BACKEND" ]; then
                cp -f "$LATEST_BACKEND" /opt/sapmall/backend_service/main
              fi
              sudo systemctl restart sapmall-backend
              exit 1
            }

            # 清理部署目录
            rm -rf ${DEPLOY_DIR}

            echo "Deployment successful: ${{ github.sha }}"
